<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Game</title>
    <<link
      href="https://fonts.googleapis.com/css?family=Poppins:100,100italic,200,200italic,300,300italic,regular,italic,500,500italic,600,600italic,700,700italic,800,800italic,900,900italic"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="container">
        <div class="screen active" id="start-screen">                <!--Start Screen-->
            <h1>Quiz Time!</h1>
            <p>Test your knowledge wuth these questions</p>
            <button id="start-btn">Start Quiz</button>
        </div>

        <div class="screen" id="quiz-screen">                  <!--Quiz Screen-->
            <div class="quiz-header">
                <h2 id="question-text">Question goes here</h2>
            </div>
            
            <div class="quiz-info">
                <p id="question-sounter">Question <span id="current-question">1</span> of <span id="total-questions">5</span></p>
                <p>Score: <span id="score">0</span></p>
            </div>

            <div id="answers-container" class="answers-container">
                <!--Answer buttons will be inserted here from our js code later-->
            </div>

            <div class="progress-bar">
                <div id="progress" class="progress"></div>
            </div>
        </div>

        <div id="result-screen"  class="screen">                                    <!--Result Screen-->
            <h1>Quiz Results</h1>
            <div class="results-info">
                <p>You scored <span id="final-score">0</span> out of <span id="max-score">5</span></p>

                <div id="result-message">
                    Good Job!
                </div>
            </div>
            <button id="restart-btn">Restart Quiz</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
